version: "3.9"

services:
  # ── Backend API ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - /tmp/dev-agent-repos:/tmp/dev-agent-repos
    env_file:
      - .env
    environment:
      - REPOS_BASE_PATH=/tmp/dev-agent-repos
      - DATABASE_URL=postgresql+asyncpg://devagent:devagent@postgres:5432/devagent
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend Dashboard ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

  # ── PostgreSQL ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: devagent
      POSTGRES_USER: devagent
      POSTGRES_PASSWORD: devagent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devagent"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
